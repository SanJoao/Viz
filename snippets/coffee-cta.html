<!--
  viz · coffee CTA — the "buy me a coffee" note every entry carries at the end.

  Placement: put it right after the entry's content/sources, just before the
  closing scripts. It's the highest-intent spot — the reader just got value.

  HOW TO USE:
    1. Paste the <style> + <p> below near the end of the entry's <body>.
    2. It auto-themes: it reads --accent and --muted if the entry defines
       them (with sensible fallbacks), so it works in light or dark entries
       with no edits.
    3. If the entry is translated (data-i18n), add coffeeNote / coffeeLink to
       each language; otherwise just hardcode the text in the spans.
    4. If the entry has an @media print block, add .coffee-cta to its
       display:none list — a donate link shouldn't print on a poster.

  The Ko-fi handle matches the notebook's signature: u/ArchiTechOfTheFuture.
-->
<style>
  .coffee-cta {
    text-align: center; margin: 6px auto 50px; padding: 0 16px;
    font-size: 14px; color: var(--muted, #777);
  }
  .coffee-cta a {
    color: var(--accent, #2b50c8); text-decoration: none; margin-left: 4px;
    white-space: nowrap; border-bottom: 1px dashed currentColor; padding-bottom: 1px;
  }
  .coffee-cta a:hover { border-bottom-style: solid; }
</style>

<p class="coffee-cta">
  <span data-i18n="coffeeNote">Enjoyed this rabbit hole?</span>
  <a href="https://ko-fi.com/architechofthefuture" target="_blank" rel="noopener">☕ <span data-i18n="coffeeLink">buy me a coffee</span></a>
</p>
