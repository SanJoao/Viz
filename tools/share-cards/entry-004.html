<!DOCTYPE html>
<!-- viz · share card template — entry 004, The Measure of a Team (1200×630).
     A polaroid of the height wall on notebook paper, caption handwritten.
     Embeds heights-raw.png (a clean shot of the wall). Rendered to
     /worldcup-heights/share.jpg by make.ps1. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background-color: #faf6ec;
    background-image: radial-gradient(rgba(60,50,30,.14) 1.2px, transparent 1.4px);
    background-size: 23px 23px;
    font-family: "Inter", sans-serif; color: #2c2a25;
  }
  /* faint Vitruvian watermark, lower-right */
  .vitruvian { position: absolute; right: -70px; bottom: -90px; width: 360px; height: 360px; opacity: .07; }
  /* ── polaroid (left) ── */
  .polaroid {
    position: absolute; left: 64px; top: 52px;
    transform: rotate(-2.4deg);
    background: #fffdf7; padding: 16px 16px 14px;
    box-shadow: 0 14px 34px rgba(60,50,30,.30);
  }
  .photo {
    width: 440px; height: 416px; overflow: hidden; position: relative;
    background: #efe5cd; border: 1px solid rgba(60,50,30,.12);
  }
  .photo img.shot { width: 100%; height: 100%; object-fit: cover; object-position: 6% 36%; }
  .pcap {
    font-family: "Caveat", cursive; font-weight: 600; font-size: 36px;
    color: #d93025; text-align: center; padding-top: 10px; transform: rotate(-.5deg);
  }
  .tape {
    position: absolute; top: -26px; left: 50%; transform: translateX(-50%) rotate(-3deg);
    width: 170px; height: 44px;
    background: linear-gradient(rgba(150,190,255,.5), rgba(150,190,255,.42));
    box-shadow: 0 1px 4px rgba(60,50,30,.12);
  }
  /* ── text column (right) ── */
  .col { position: absolute; left: 620px; top: 104px; width: 524px; }
  .stamp {
    font-family: "JetBrains Mono", monospace; font-size: 20px; color: #2c2a25;
    background: linear-gradient(transparent 18%, #ffef9e 18%, #ffef9e 88%, transparent 88%);
    display: inline-block; padding: 2px 8px;
  }
  h1 {
    font-family: "Caveat", cursive; font-weight: 700; font-size: 72px; line-height: .95;
    margin: 22px 0 0; transform: rotate(-1.2deg); color: #01303d;
  }
  .sub { font-size: 23px; line-height: 1.5; color: #55514a; margin: 22px 0 0; }
  .sub b { color: #2b50c8; }
  .site {
    font-family: "JetBrains Mono", monospace; font-size: 19px; color: #8a857c;
    margin: 30px 0 0; display: flex; align-items: center; gap: 10px;
  }
  .site img { width: 26px; height: 26px; }
</style>
</head>
<body>
  <svg class="vitruvian" viewBox="0 0 200 200" fill="none" stroke="#3a2c1c" stroke-width="1">
    <circle cx="100" cy="100" r="92"/><rect x="20" y="20" width="160" height="160"/>
    <line x1="100" y1="14" x2="100" y2="186" stroke-width=".5"/><line x1="14" y1="100" x2="186" y2="100" stroke-width=".5"/>
  </svg>
  <div class="polaroid">
    <div class="tape"></div>
    <div class="photo"><img class="shot" src="heights-raw.png" alt=""></div>
    <div class="pcap">goalkeepers are a species apart</div>
  </div>
  <div class="col">
    <span class="stamp">entry 004 · jun 23 2026 · rabbit hole ⚽</span>
    <h1>The Measure<br>of a Team</h1>
    <p class="sub"><b>All 1,248 players</b> of the 2026 World Cup, drawn to scale and lined up against the ruler — by squad, or the whole tournament.</p>
    <div class="site"><img src="../../logo.svg" alt="">viz.luarai.com</div>
  </div>
</body>
</html>
