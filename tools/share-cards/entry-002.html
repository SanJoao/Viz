<!DOCTYPE html>
<!-- viz · share card template — entry 002, World Cup defense (1200×630).
     A polaroid of the attack-vs-defense chart on notebook paper.
     Expects defense-raw.png next to this file (2x screenshot of the live page,
     taken by make.ps1 first). Rendered to /worldcup-defense/share.jpg. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background-color: #faf6ec;
    background-image: radial-gradient(rgba(60,50,30,.14) 1.2px, transparent 1.4px);
    background-size: 23px 23px;
    font-family: "Inter", sans-serif; color: #2c2a25;
  }
  .polaroid {
    position: absolute; left: 64px; top: 48px;
    transform: rotate(-2.4deg);
    background: #fffdf7; padding: 16px 16px 14px;
    box-shadow: 0 14px 34px rgba(60,50,30,.30);
  }
  .photo { width: 440px; height: 420px; overflow: hidden; position: relative; background: #ffffff; }
  /* defense-raw.png is a 2x phone screenshot (1440×2360). Frame the scatter panel. */
  .photo img { position: absolute; width: 624px; left: -96px; top: -432px; }
  .pcap {
    font-family: "Caveat", cursive; font-weight: 600; font-size: 40px;
    color: #d93025; text-align: center; padding-top: 10px; transform: rotate(-.5deg);
  }
  .tape {
    position: absolute; top: -26px; left: 50%; transform: translateX(-50%) rotate(-3deg);
    width: 170px; height: 44px;
    background: linear-gradient(rgba(150,190,255,.5), rgba(150,190,255,.42));
    box-shadow: 0 1px 4px rgba(60,50,30,.12);
  }
  .col { position: absolute; left: 620px; top: 116px; width: 520px; }
  .stamp {
    font-family: "JetBrains Mono", monospace; font-size: 20px; color: #2c2a25;
    background: linear-gradient(transparent 18%, #ffef9e 18%, #ffef9e 88%, transparent 88%);
    display: inline-block; padding: 2px 8px;
  }
  h1 {
    font-family: "Caveat", cursive; font-weight: 700; font-size: 66px; line-height: 1;
    margin: 26px 0 0; transform: rotate(-1.2deg);
  }
  .sub { font-size: 23px; line-height: 1.5; color: #55514a; margin: 24px 0 0; }
  .sub b { color: #2b50c8; }
  .site {
    font-family: "JetBrains Mono", monospace; font-size: 19px; color: #8a857c;
    margin: 32px 0 0; display: flex; align-items: center; gap: 10px;
  }
  .site img { width: 26px; height: 26px; }
</style>
</head>
<body>
  <div class="polaroid">
    <div class="tape"></div>
    <div class="photo"><img src="defense-raw.png" alt=""></div>
    <div class="pcap">score less, win more?</div>
  </div>
  <div class="col">
    <span class="stamp">entry 002 · jun 19 2026 · rabbit hole ⚽</span>
    <h1>Defenses win World Cups</h1>
    <p class="sub"><b>Every World Cup team, 1930–2022</b>, mapped by attack vs defense. The trophy comes down almost entirely to defense.</p>
    <div class="site"><img src="../../logo.svg" alt="">viz.luarai.com</div>
  </div>
</body>
</html>
