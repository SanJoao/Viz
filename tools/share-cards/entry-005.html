<!DOCTYPE html>
<!-- viz · share card template — entry 005, A Streak, in Bloom (1200×630).
     Lean editorial. Self-contained: renders its own streak-rose SVG.
     Rendered to /streak-in-bloom/share.jpg by make.ps1. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0; box-sizing:border-box}
  body{
    width:1200px; height:630px; overflow:hidden; position:relative;
    background:radial-gradient(circle at 78% 50%, #FBF8F1, #F1ECE0);
    font-family:'Manrope',sans-serif; color:#23262b;
  }
  .rose{position:absolute; left:70px; top:95px; width:440px; height:440px}
  .rose svg{width:100%; height:100%; overflow:visible}
  .col{position:absolute; left:580px; top:150px; width:560px}
  .eyebrow{font-size:16px; letter-spacing:3px; text-transform:uppercase; color:#7c7468}
  h1{font-family:'Fraunces',serif; font-weight:500; font-size:78px; line-height:1.0; color:#1D2E4C; margin:14px 0 0; letter-spacing:-1px}
  h1 em{font-style:italic; color:#E65100}
  .sub{font-size:23px; line-height:1.5; color:#6b6358; margin-top:26px; font-weight:500}
  .foot{position:absolute; left:580px; bottom:46px; display:flex; align-items:center; gap:11px; font-family:'Manrope'; font-size:19px; color:#8a8275}
  .foot img{width:25px; height:25px}
  .foot .sep{color:#c3bbac}
</style>
</head>
<body>
  <div class="rose"><svg id="rose" viewBox="0 0 440 440"></svg></div>
  <div class="col">
    <div class="eyebrow">entry 005 · a field note</div>
    <h1>A streak,<br><em>in bloom</em></h1>
    <p class="sub">A month of language practice, drawn as a rose instead of a calendar — where every petal's height, colour and tip quietly mean something.</p>
  </div>
  <div class="foot"><img src="../../logo.svg" alt="">viz.luarai.com <span class="sep">·</span> from Severo</div>

  <script>
    const cx=220, cy=220, maxR=205, innerR=maxR*0.32, slot=2*Math.PI/28, base=-Math.PI/2 - slot/2, gap=0.018;
    const oF=[255,183,77], oE=[230,81,0];
    const lerp=(a,b,t)=>`rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
    const ember=t=>lerp(oF,oE,Math.log(1+4*Math.max(0,Math.min(1,t)))/Math.log(5));
    const P=(r,a)=>[cx+Math.cos(a)*r, cy+Math.sin(a)*r];
    function rng(s){let t=s>>>0;return ()=>{t+=0x6D2B79F5;let x=Math.imul(t^t>>>15,1|t);x^=x+Math.imul(x^x>>>7,61|x);return ((x^x>>>14)>>>0)/4294967296;};}
    function rwedge(inner,outer,a1,a2){
      const r1=[Math.cos(a1),Math.sin(a1)], r2=[Math.cos(a2),Math.sin(a2)];
      const c1=[cx+r1[0]*inner,cy+r1[1]*inner],c2=[cx+r1[0]*outer,cy+r1[1]*outer],c3=[cx+r2[0]*outer,cy+r2[1]*outer],c4=[cx+r2[0]*inner,cy+r2[1]*inner];
      const rr=Math.min((outer-inner)*0.5,(a2-a1)*outer*0.5);
      const aI=rr/Math.max(inner,1), aO=rr/Math.max(outer,1);
      const n2a=P(outer,a1+aO), n4a=P(inner,a2-aI);
      const n1=[c1[0]+r1[0]*rr,c1[1]+r1[1]*rr],n2=[c2[0]-r1[0]*rr,c2[1]-r1[1]*rr],n3=[c3[0]-r2[0]*rr,c3[1]-r2[1]*rr],n4=[c4[0]+r2[0]*rr,c4[1]+r2[1]*rr];
      const oe=P(outer,a2-aO), ie=P(inner,a1+aI);
      return `M${n1} L${n2} Q${c2} ${n2a} A${outer} ${outer} 0 0 1 ${oe} Q${c3} ${n3} L${n4} Q${c4} ${n4a} A${inner} ${inner} 0 0 0 ${ie} Q${c1} ${n1} Z`;
    }
    const R=rng(11); let out="", outerOf=[];
    for(let i=0;i<28;i++){
      const a1=base+i*slot+gap/2, a2=base+(i+1)*slot-gap/2;
      let m=17+R()*15, frozen=(i===22), langs=(R()<0.26&&!frozen)?2+(R()<0.4?1:0):1, nw=Math.pow(R(),1.6);
      const ratio = frozen?0.10 : 0.60+0.40*Math.min((m-15)/15,1);   // height = minutes
      const outer=innerR+(maxR-innerR)*ratio; outerOf.push({outer,frozen,langs});
      const fill = frozen ? lerp([179,229,252],[2,119,189],0.4+nw*0.4) : ember(nw); // colour = new vocab
      out+=`<path d="${rwedge(innerR,outer,a1,a2)}" fill="${fill}"/>`;
      if(langs>=2&&!frozen){ const dots=Math.min(langs-1,3), mid=(a1+a2)/2, dr=2.8, b=outer-7;
        for(let k=0;k<dots;k++){ const t=dots===1?0:(k/(dots-1))*2-1; const ang=mid-((2*dr)/b)*(dots-1)/2+k*((2*dr)/b); const [px,py]=P(b+(1-t*t)*2.4,ang); out+=`<circle cx="${px}" cy="${py}" r="${dr}" fill="#AB47BC"/>`; } }
    }
    for(let w=0;w<4;w++){ const s=w*7,e=s+6; let perfect=true,tall=0; for(let i=s;i<=e;i++){ if(outerOf[i].frozen){perfect=false;break;} if(outerOf[i].outer>tall)tall=outerOf[i].outer; }
      if(perfect){ const a1=base+s*slot+gap/2,a2=base+(e+1)*slot-gap/2,rr=tall+6; const [x1,y1]=P(rr,a1),[x2,y2]=P(rr,a2); out+=`<path d="M${x1} ${y1} A${rr} ${rr} 0 0 1 ${x2} ${y2}" fill="none" stroke="#E8B84B" stroke-width="4" stroke-linecap="round"/>`; } }
    out+=`<circle cx="${cx}" cy="${cy}" r="${innerR-4}" fill="#F4EFE4"/>`;
    out+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Fraunces,serif" font-weight="600" font-size="42" fill="#E65100">1.1m</text>`;
    out+=`<text x="${cx}" y="${cy+26}" text-anchor="middle" font-family="Manrope" font-size="15" fill="#9a9182">streak</text>`;
    document.getElementById("rose").innerHTML=out;
  </script>
</body>
</html>
